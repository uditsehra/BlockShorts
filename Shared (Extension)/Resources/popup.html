<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            width: 260px;
            padding: 12px;
            margin: 0;
            background: #f4f4f7;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            text-align: center;
        }
        h3 { margin: 0 0 16px 0; font-size: 18px; color: #1c1c1e; }
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 16px;
        }
        .toggle-row span { font-weight: 500; font-size: 14px; }
        
        /* Custom Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #34c759; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Stats Styling */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .stat-box {
            background: #f9f9fb;
            padding: 10px;
            border-radius: 10px;
        }
        .stat-label { font-size: 11px; color: #8e8e93; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 15px; font-weight: 700; color: #1c1c1e; }
        .footer-text { font-size: 12px; color: #aeaeb2; margin-top: 20px; font-style: italic; }
    </style>
</head>
<body>
    <div class="card">
        <h3>No Shorts 🚫</h3>

        <div class="toggle-row">
            <span>Blocking Active</span>
            <label class="switch">
                <input type="checkbox" id="toggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">🔥 Streak</div>
                <div id="streakCount" class="stat-value">0 Days</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">⏳ Saved</div>
                <div id="timeSavedDisplay" class="stat-value">0 min</div>
            </div>
        </div>

        <p class="footer-text">Stay focused. No endless scrolling.</p>
    </div>
    <script src="popup.js"></script>
</body>
</html>
